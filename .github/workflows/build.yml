name: Build

on:
  workflow_dispatch:
    inputs:
      publish-packages:
        type: boolean
        description: "Publish all packages"
        default: false
  workflow_call:
    inputs:
      publish-packages:
        type: boolean
        description: "Publish all packages"
        default: false

jobs:
  Build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build Packages
        run: npm run build

      - name: Build App
        run: npm run build -w apps/app

      - name: Build App Shell App
        run: npm run build -w apps/default-app

      - name: Publish Packages
        # only publish on Linux to avoid duplicate publishes
        if: ${{ inputs.publish-packages && matrix.os == 'ubuntu-latest' }}
        run: npx -y pkg-pr-new publish './packages/*' --no-template
